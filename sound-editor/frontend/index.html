<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ICR Sound Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #ccc; font-family: monospace; overflow: hidden; }
    #canvas-container { width: 100vw; height: 100vh; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
    }
    #panel-left {
      position: absolute; left: 0; top: 0; width: 260px; height: 100%;
      background: rgba(10,10,20,0.85); border-right: 1px solid #224;
      pointer-events: all; overflow-y: auto; padding: 12px 8px;
    }
    #panel-right {
      position: absolute; right: 0; top: 0; width: 280px; height: 100%;
      background: rgba(10,10,20,0.85); border-left: 1px solid #224;
      pointer-events: all; overflow-y: auto; padding: 12px 8px;
    }
    #status-bar {
      position: absolute; bottom: 0; left: 260px; right: 280px; height: 28px;
      background: rgba(10,10,20,0.9); border-top: 1px solid #224;
      display: flex; align-items: center; padding: 0 12px; font-size: 11px;
      color: #556; pointer-events: all;
    }
    h3 { color: #88aaff; font-size: 11px; letter-spacing: .1em;
         text-transform: uppercase; margin: 8px 0 6px; }
    label { font-size: 11px; color: #889; display: block; margin-top: 6px; }
    input[type=range] { width: 100%; margin: 2px 0; accent-color: #4af; }
    input[type=number] { width: 60px; background: #111; border: 1px solid #334;
                         color: #ccc; padding: 2px 4px; font-size: 11px; }
    select { width: 100%; background: #111; border: 1px solid #334;
             color: #ccc; padding: 3px 4px; font-size: 11px; margin-top: 2px; }
    button { background: #1a2a3a; border: 1px solid #446; color: #aac;
             padding: 4px 10px; font-size: 11px; cursor: pointer; margin-top: 4px;
             width: 100%; }
    button:hover { background: #2a3a4a; }
    button.primary { background: #1a3a5a; border-color: #4af; color: #4af; }
    button.danger  { background: #3a1a1a; border-color: #f44; color: #f44; }
    .sep { border-top: 1px solid #223; margin: 8px 0; }
    .layer-item { padding: 3px 6px; font-size: 11px; cursor: pointer;
                  border-left: 3px solid transparent; margin: 1px 0; }
    .layer-item:hover { background: #1a1a2a; }
    .layer-item.active { background: #0a1a2a; border-left-color: #4af; color: #fff; }
    .cp-row { display: flex; justify-content: space-between; align-items: center;
              font-size: 10px; padding: 2px 4px; border-bottom: 1px solid #222; }
    .cp-row.anchor { color: #ffa; }
    #hud-note { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.7); padding: 4px 12px; font-size: 12px;
                color: #4af; border: 1px solid #224; pointer-events: none; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="ui-overlay">
    <!-- Left panel: layer browser -->
    <div id="panel-left">
      <h3>Layers</h3>
      <select id="sel-group" onchange="app.filterGroup(this.value)">
        <option value="">All groups</option>
        <option value="global">Global</option>
        <option value="noise">Noise</option>
        <option value="envelope">Envelope</option>
        <option value="partial">Partial</option>
      </select>
      <select id="sel-partial-k" style="margin-top:4px" onchange="app.filterK(parseInt(this.value)||0)">
        <option value="0">All partials</option>
      </select>
      <div id="layer-list" style="margin-top:8px"></div>
    </div>

    <!-- Right panel: spline inspector -->
    <div id="panel-right">
      <h3>Active Layer</h3>
      <div id="active-layer-name" style="color:#4af;font-size:12px;margin-bottom:6px">—</div>

      <h3>Spline Config</h3>
      <label>Stiffness (α)
        <input type="range" id="cfg-stiffness" min="0.01" max="20" step="0.01" value="1">
        <span id="val-stiffness">1.00</span>
      </label>
      <label>Degree
        <select id="cfg-degree">
          <option value="1">1 – linear</option>
          <option value="3" selected>3 – cubic</option>
          <option value="5">5 – quintic</option>
        </select>
      </label>
      <label>Bass split (MIDI)
        <input type="number" id="cfg-bass-split" value="52" min="21" max="108">
      </label>
      <button onclick="app.applySplineConfig()">Apply config</button>
      <button onclick="app.fitSpline()" class="primary" style="margin-top:6px">Fit spline</button>

      <div class="sep"></div>
      <h3>Control Points</h3>
      <div id="cp-list"></div>

      <div class="sep"></div>
      <h3>MIDI / SysEx</h3>
      <select id="sel-midi-port"></select>
      <button onclick="app.connectMidi()">Connect</button>
      <button onclick="app.sysexBank()" class="primary" style="margin-top:4px">Send bank →</button>
      <div id="midi-status" style="font-size:10px;color:#556;margin-top:4px">Disconnected</div>

      <div class="sep"></div>
      <h3>Export</h3>
      <input id="export-path" type="text" placeholder="path/to/soundbank.json"
             style="width:100%;background:#111;border:1px solid #334;color:#ccc;padding:3px 4px;font-size:11px;margin-top:2px">
      <button onclick="app.exportSoundbank()" class="primary" style="margin-top:4px">Save soundbank</button>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-msg">Ready. Load a soundbank to begin.</span>
      <span style="flex:1"></span>
      <input id="load-path" type="text" placeholder="soundbank JSON path"
             style="width:280px;background:#0a0a14;border:1px solid #334;color:#aaa;
                    padding:2px 6px;font-size:11px;margin-right:6px">
      <button onclick="app.loadSoundbank()" style="width:auto;padding:2px 10px">Load</button>
    </div>

    <!-- HUD -->
    <div id="hud-note" style="display:none"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
